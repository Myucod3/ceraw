<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="buttons.css">
    <title>ceraw</title>
</head>
<body>
    <aside>
        <h1>ceraw</h1>
        <nav>
            <h2 class="nav-nm">navigation</h2>
        </nav>
    </aside>
    <main>
        <h2>canvas</h2>

        <section class="post__upload">
            <div>
                <div class="toolbox">
                    <div>
                        <p>Colors coming soon</p>
                    </div>
                    <div class="toolbox-sizes-other">
                        <div class="toolbox__sizes">
                            <button id="2px-btn" class="size__button">2px</button>
                            <button id="4px-btn" class="size__button">4px</button>
                            <button id="6px-btn" class="size__button">6px</button>
                            <button id="8px-btn" class="size__button">8px</button>
                        </div>
                        <div class="toolbox__other">
                            <button id="tool-ers" class="tool__other">Eraser</button>
                            <button id="tool-clr" class="tool__other">Clear</button>
                        </div>
                        <span id="brs-size-inf" class="tool-size-info"></span>
                    </div>
                </div>
            </div>
            <canvas id="post" width="500" height="500"></canvas>
            <form id="upl-form">
                <button type="submit" class="upload__button">Upload</button>
            </form>
        </section>

        <section class="posts-page" id="upl-pg">
            <h3>Uploads</h3>
            <div class="posts-elements" id="post-el">

            </div>
        </section>
    </main>
    <footer>
        <p>footer</p>
    </footer>
    <script src="canvas-script.js"></script>
    <script src="posts-script.js"></script>
</body>
</html>
